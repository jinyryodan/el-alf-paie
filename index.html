<script>
/* ==================== STORAGE KEYS ==================== */

/* ==================== HELPERS ==================== */
function uid() { return Math.random().toString(36).substr(2, 9); }
function safeFloat(val) {
  if (val === null || val === undefined || val === '') return 0;
  if (typeof val === 'number') return val;
  const str = String(val).replace(',', '.').replace(/\s/g, '');
  const num = parseFloat(str);
  return isNaN(num) ? 0 : num;
}
function fmt2(v) {
  const n = safeFloat(v);
  return n.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmt3(v) {
  const n = safeFloat(v);
  return n.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 3 });
}
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function persistUser() {
  if (state.currentUser) localStorage.setItem(LS.USER, JSON.stringify(state.currentUser));
  else localStorage.removeItem(LS.USER);
}
function getMasterCode() { return localStorage.getItem(LS.MASTER_CODE) || '0000'; }
function setMasterCode(code) { localStorage.setItem(LS.MASTER_CODE, code); }

function saveCurrentRecord() {
  const id = state.currentRecordId || uid();
  if (!state.currentRecordId) state.currentRecordId = id;
  const record = {
    id,
    employee: state.employee,
    rubriques: state.rubriques,
    workInfo: state.workInfo,
    modePaiement: state.modePaiement,
    montantLettres: state.montantLettres,
    lastModified: Date.now()
  };
  const idx = state.savedRecords.findIndex(r => r.id === id);
  if (idx >= 0) state.savedRecords[idx] = record;
  else state.savedRecords.push(record);
  persistDb();
}

function triggerAutoSave() {
  state.isSaving = true;
  updateSaveIndicator();
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    saveCurrentRecord();
    state.isSaving = false;
    updateSaveIndicator();
  }, 1000);
}

function updateSaveIndicator() {
  const el = document.getElementById('save-indicator');
  if (!el) return;
  el.innerHTML = state.isSaving
    ? '<span class="w-2 h-2 rounded-full bg-yellow-400 animate-pulse"></span><span class="text-yellow-100">Sauvegarde...</span>'
    : '<span class="w-2 h-2 rounded-full bg-green-500"></span><span class="text-green-100">Enregistré</span>';
}

/* ==================== AUTH ==================== */
function isAdmin() { return state.currentUser && state.currentUser.role === 'admin'; }

function loginAdmin(email, pass) {
  const users = JSON.parse(localStorage.getItem(LS.ADMIN_DB) || '[]');
  const found = users.find(u => (u.email || '').toLowerCase() === email.toLowerCase() && u.password === pass);
  if (found) {
    const { password, ...safe } = found;
    state.currentUser = safe;
    persistUser();
    return true;
  }
  return false;
}
function signupAdmin(name, email, pass) {
  if (!name || !email || !pass) return false;
  const users = JSON.parse(localStorage.getItem(LS.ADMIN_DB) || '[]');
  if (users.some(u => (u.email || '').toLowerCase() === email.toLowerCase())) return false;
  const newUser = { id: uid(), name, email, role: 'admin', password: pass };
  users.push(newUser);
  localStorage.setItem(LS.ADMIN_DB, JSON.stringify(users));
  const { password, ...safe } = newUser;
  state.currentUser = safe;
  persistUser();
  return true;
}
function loginAsEmployee(name, matricule) {
  state.currentUser = { id: 'emp_' + uid(), name, identifier: matricule || name, role: 'employee' };
  persistUser();
}
function logout() {
  state.currentUser = null;
  persistUser();
  render();
}
function authenticateEmployee(matricule, code) {
  if (!matricule || !code) return null;
  const matClean = matricule.toLowerCase().trim();
  const codeClean = code.trim();
  return state.savedRecords.find(r => {
    const rMat = (r.employee.matricule || '').toLowerCase().trim();
    const rCode = (r.employee.accessCode || '').trim();
    return rMat === matClean && rCode === codeClean;
  }) || null;
}

/* ==================== COMPUTED ==================== */
function totalGains() { return state.rubriques.reduce((a, r) => a + safeFloat(r.gain), 0); }
function totalRetenues() { return state.rubriques.reduce((a, r) => a + safeFloat(r.retenue), 0); }
function netAPayer() {
  const basicNet = totalGains() - totalRetenues();
  const manualDeduction = safeFloat(state.workInfo.autreRetenue);
  return basicNet - manualDeduction;
}
function soldeCongeM() {
  return safeFloat(state.workInfo.soldeCongeM1) + safeFloat(state.workInfo.congesAcquis) - safeFloat(state.workInfo.congesPris);
}
function findRubriqueRetenue(codes) {
  const r = state.rubriques.find(x => codes.includes(x.code));
  return r ? safeFloat(r.retenue) : 0;
}
function cotisationCNSS() { return findRubriqueRetenue(['1208', '300']); }
function cotisationMutuelle() { return findRubriqueRetenue(['1303', '301']); }
function cotisationCIMR() { return findRubriqueRetenue(['302']); }
function cotisationAMO() { return findRubriqueRetenue(['1209', '304']); }
function retenueIR() { return findRubriqueRetenue(['303']); }
function salaireBrut() {
  const r = state.rubriques.find(x => x.code === '1000');
  return r ? safeFloat(r.gain) : totalGains();
}
function salaireBrutImposableDisplay() {
  const override = safeFloat(state.workInfo.salaireBrutImposable);
  return override > 0 ? override : salaireBrut();
}

function updateSpecificRetenue(code, designation, val) {
  const amount = safeFloat(val);
  const existing = state.rubriques.find(r => r.code === code);
  if (existing) {
    state.rubriques = state.rubriques.map(r => r.code === code ? { ...r, retenue: amount } : r);
  } else if (amount !== 0) {
    state.rubriques = [...state.rubriques, { id: uid(), code, designation, base: 0, taux: 0, gain: 0, retenue: amount, isAuto: false }];
  }
}

function updateRubriqueField(id, field, value) {
  state.rubriques = state.rubriques.map(item => item.id === id ? { ...item, [field]: value } : item);
  const refItem = state.rubriques.find(i => i.code === '0307');
  const baseHourlyRate = refItem ? safeFloat(refItem.taux) : 0;
  state.rubriques = state.rubriques.map(item => {
    if (!item.isAuto) return item;
    let currentBase = safeFloat(item.base);
    let currentTaux = safeFloat(item.taux);
    if (refItem && item.id !== refItem.id) {
      if (item.code === '0406') currentTaux = baseHourlyRate * 1.25;
      else if (item.code === '0407') currentTaux = baseHourlyRate * 1.50;
      else if (item.code === '0408') currentTaux = baseHourlyRate * 2.00;
    }
    let newGain = item.gain;
    if (currentBase > 0 || currentTaux > 0) {
      newGain = Math.round(currentBase * currentTaux * 100) / 100;
    }
    return { ...item, base: currentBase, taux: currentTaux, gain: newGain };
  });
  triggerAutoSave();
}
function toggleRubriqueAuto(id) {
  state.rubriques = state.rubriques.map(item => item.id === id ? { ...item, isAuto: !item.isAuto } : item);
  recalcAutoRubriques();
  renderRubriquesRows();
  updateSummaryFields();
  triggerAutoSave();
}
function recalcAutoRubriques() {
  const refItem = state.rubriques.find(i => i.code === '0307');
  const baseHourlyRate = refItem ? safeFloat(refItem.taux) : 0;
  state.rubriques = state.rubriques.map(item => {
    if (!item.isAuto) return item;
    let currentBase = safeFloat(item.base);
    let currentTaux = safeFloat(item.taux);
    if (refItem && item.id !== refItem.id) {
      if (item.code === '0406') currentTaux = baseHourlyRate * 1.25;
      else if (item.code === '0407') currentTaux = baseHourlyRate * 1.50;
      else if (item.code === '0408') currentTaux = baseHourlyRate * 2.00;
    }
    let newGain = item.gain;
    if (currentBase > 0 || currentTaux > 0) {
      newGain = Math.round(currentBase * currentTaux * 100) / 100;
    }
    return { ...item, base: currentBase, taux: currentTaux, gain: newGain };
  });
}
function addRubrique() {
  state.rubriques = [...state.rubriques, { id: uid(), code: '', designation: '', base: 0, taux: 0, gain: 0, retenue: 0, isAuto: false }];
  renderRubriquesRows();

}

function attachAuthEvents() {
  document.querySelectorAll('.role-tab').forEach(btn => {
    btn.onclick = () => { state.selectedRole = btn.dataset.role; state.errorMessage = null; render(); };
  });
  const empForm = document.getElementById('employee-login-form');
  if (empForm) empForm.onsubmit = (e) => {
    e.preventDefault();
    const matricule = document.getElementById('emp-matricule').value.trim();
    const code = document.getElementById('emp-code').value.trim();
    if (!matricule || !code) { state.errorMessage = 'Veuillez entrer votre matricule et code.'; render(); return; }
    const record = authenticateEmployee(matricule, code);
    if (record) {
      loginAsEmployee(record.employee.nomPrenom, record.employee.matricule);
      state.errorMessage = null;
      render();
    } else {
      state.errorMessage = 'Identifiants incorrects.';
      render();
    }
  };
  const toggleBtn = document.getElementById('toggle-admin-mode');
  if (toggleBtn) toggleBtn.onclick = () => { state.isAdminLoginMode = !state.isAdminLoginMode; state.errorMessage = null; render(); };
  const adminForm = document.getElementById('admin-form');
  if (adminForm) adminForm.onsubmit = (e) => {
    e.preventDefault();
    state.errorMessage = null;
    if (state.isAdminLoginMode) {
      const email = document.getElementById('admin-email').value.trim();
      const pass = document.getElementById('admin-pass').value;
      if (!loginAdmin(email, pass)) { state.errorMessage = 'Email ou mot de passe incorrect.'; render(); return; }
      render();
    } else {
      const code = document.getElementById('admin-code').value.trim();
      const name = document.getElementById('admin-name').value.trim();
      const email = document.getElementById('admin-email').value.trim();
      const pass = document.getElementById('admin-pass').value;
      if (code !== getMasterCode()) { state.errorMessage = 'Code secret incorrect.'; render(); return; }
      if (!signupAdmin(name, email, pass)) { state.errorMessage = 'Cet email est déjà utilisé.'; render(); return; }
      render();
    }
  };
}

/* ==================== EMPLOYEE LIST ==================== */
function calcNet(record) {
  const gains = record.rubriques.reduce((a, r) => a + safeFloat(r.gain), 0);
  const ret = record.rubriques.reduce((a, r) => a + safeFloat(r.retenue), 0);
  return gains - ret;
}
function filteredRecords() {
  let records = state.savedRecords;
  const term = state.searchTerm.toLowerCase();
  if (!isAdmin()) {
    const cur = state.currentUser;
    if (cur && cur.identifier) {
      const searchId = cur.identifier.toLowerCase().trim();
      records = records.filter(r => {
        const mat = (r.employee.matricule || '').toLowerCase().trim();
        const nom = (r.employee.nomPrenom || '').toLowerCase().trim();
        return mat === searchId || nom === searchId || nom.includes(searchId);
      });
    } else return [];
  }
  if (term) {
    records = records.filter(r =>
      (r.employee.nomPrenom && r.employee.nomPrenom.toLowerCase().includes(term)) ||
      (r.employee.matricule && r.employee.matricule.toLowerCase().includes(term)) ||
      (r.employee.fonction && r.employee.fonction.toLowerCase().includes(term))
    );
  }
  return records;
}

function attachListEvents() {
  const searchInput = document.getElementById('search-input');
  if (searchInput) {
    searchInput.oninput = () => {
      state.searchTerm = searchInput.value;
      const cursorPos = searchInput.selectionStart;
      const main = document.getElementById('main-content');
      main.innerHTML = renderEmployeeList();
      attachListEvents();
      const newInput = document.getElementById('search-input');
      newInput.focus();
      newInput.setSelectionRange(cursorPos, cursorPos);
    };
  }
  const secBtn = document.getElementById('security-btn');
  if (secBtn) secBtn.onclick = () => { state.showSecurityModal = true; render(); };
  const createBtn = document.getElementById('create-new-btn');
  if (createBtn) createBtn.onclick = createNewEmployee;
  document.querySelectorAll('.emp-row').forEach(row => {
    row.onclick = (e) => { openEmployee(row.dataset.id); };
  });
  document.querySelectorAll('.open-emp-btn').forEach(btn => {
    btn.onclick = (e) => { e.stopPropagation(); openEmployee(btn.dataset.id); };
  });
  document.querySelectorAll('.del-emp-btn').forEach(btn => {
    btn.onclick = (e) => { e.stopPropagation(); deleteEmployee(btn.dataset.id); };
  });
  const cancelSec = document.getElementById('cancel-security');
  if (cancelSec) cancelSec.onclick = () => { state.showSecurityModal = false; render(); };
  const saveSec = document.getElementById('save-security');
  if (saveSec) saveSec.onclick = () => {
    const val = document.getElementById('new-master-code').value.trim();
    if (val) { setMasterCode(val); state.showSecurityModal = false; render(); alert('Code secret mis à jour.'); }
    else alert('Code invalide.');
  };
}

/* ==================== SUMMARY / COMPUTED DOM UPDATE ==================== */
function updateSummaryFields() {
  const set = (id, val) => { const el = document.getElementById(id); if (el) { if ('value' in el) el.value = val; else el.textContent = val; } };
  set('rub-total-net', fmt2(netAPayer()));
  set('disp-salaire-brut', fmt2(salaireBrut()));
  set('disp-cnss', fmt2(cotisationCNSS()));
  set('disp-total-gains', fmt2(totalGains()));
  set('disp-total-retenues', fmt2(totalRetenues()));
  set('disp-net-1', fmt2(netAPayer()));
  set('disp-net-2', fmt2(netAPayer()));
  set('disp-solde-conge', fmt2(soldeCongeM()));
  document.querySelectorAll('.specific-retenue').forEach(inp => {
    if (document.activeElement === inp) return;
    const code = inp.dataset.code;
    if (code === '1303') inp.value = fmt2(cotisationMutuelle());
    else if (code === '302') inp.value = fmt2(cotisationCIMR());
    else if (code === '1209') inp.value = fmt2(cotisationAMO());
    else if (code === '303') inp.value = fmt2(retenueIR());
  });
  const brutImp = document.getElementById('input-brut-imposable');
  if (brutImp && document.activeElement !== brutImp) brutImp.value = state.workInfo.salaireBrutImposable || '';
}

function setPath(obj, path, value) {
  const parts = path.split('.');
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) cur = cur[parts[i]];
  cur[parts[parts.length - 1]] = value;
}

function attachEditorEvents() {
  const downloadBtn = document.getElementById('download-paper-btn');
  if (downloadBtn) downloadBtn.onclick = () => { saveCurrentRecord(); state.isPrintPreview = true; window.scrollTo(0,0); render(); };
  const closePreviewBtn = document.getElementById('close-preview-btn');
  if (closePreviewBtn) closePreviewBtn.onclick = () => { state.isPrintPreview = false; render(); };
  const downloadPdfBtn = document.getElementById('download-pdf-btn');
  if (downloadPdfBtn) downloadPdfBtn.onclick = downloadPdf;

  const bulletinForm = document.getElementById('bulletin-form');
  if (bulletinForm) {
    bulletinForm.querySelectorAll('input[data-path], select[data-path]').forEach(inp => {
      const evt = inp.tagName === 'SELECT' ? 'change' : 'input';
      inp.addEventListener(evt, () => {
        setPath(state, inp.dataset.path, inp.value);
        triggerAutoSave();
        updateSummaryFields();
      });
    });
    const toggleCodeBtn = document.getElementById('toggle-code-edit');
    if (toggleCodeBtn) toggleCodeBtn.onclick = () => { state.showCodeEdit = !state.showCodeEdit; render(); };
    const closeCodeEdit = document.getElementById('close-code-edit');
    if (closeCodeEdit) closeCodeEdit.onclick = () => { state.showCodeEdit = false; render(); };
  }

  document.querySelectorAll('.specific-retenue').forEach(inp => {
    inp.addEventListener('input', () => {
      updateSpecificRetenue(inp.dataset.code, inp.dataset.desig, inp.value);
      triggerAutoSave();
      updateSummaryFields();
    });
  });

  const addBtn = document.getElementById('add-rubrique-btn');
  if (addBtn) addBtn.onclick = addRubrique;

  attachRubriquesRowEvents();
}

function attachRubriquesRowEvents() {
  document.querySelectorAll('.rub-field').forEach(inp => {
    inp.addEventListener('input', () => {
      updateRubriqueField(inp.dataset.id, inp.dataset.field, inp.value);
      updateSummaryFields();
      // refresh other auto-calculated cells without touching the focused input
      document.querySelectorAll('.rub-field').forEach(other => {
        if (other === inp) return;
        const item = state.rubriques.find(r => r.id === other.dataset.id);
        if (!item) return;
        if (other.dataset.field === 'gain' && item.isAuto) other.value = item.gain ? fmt2(item.gain) : '';
        if (other.dataset.field === 'taux' && item.isAuto) other.value = item.taux ? fmt3(item.taux) : '';
        if (other.dataset.field === 'base' && item.isAuto) other.value = item.base || '';
      });
    });
  });
  document.querySelectorAll('.toggle-auto-btn').forEach(btn => {
    btn.onclick = () => { toggleRubriqueAuto(btn.dataset.id); };
  });
  document.querySelectorAll('.remove-rub-btn').forEach(btn => {
    btn.onclick = () => { removeRubrique(btn.dataset.id); };
  });
}

async function downloadPdf() {
  if (state.isGeneratingPdf) return;
  state.isGeneratingPdf = true;
  render();
  await new Promise(r => setTimeout(r, 50));
  try {
    const html2canvas = window.html2canvas;
    const { jsPDF } = window.jspdf;
    if (!html2canvas || !jsPDF) { alert("Outils d'impression non prêts."); state.isGeneratingPdf = false; render(); return; }
    const element = document.querySelector('.print-preview-container .a4-sheet');
    if (!element) throw new Error('Element introuvable');
    const canvas = await html2canvas(element, { scale: 2, useCORS: true, logging: false, backgroundColor: '#ffffff' });
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pdfWidth = pdf.internal.pageSize.getWidth();
    const canvasRatio = canvas.height / canvas.width;
    const printHeight = pdfWidth * canvasRatio;
    pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, printHeight);
    pdf.save(`Bulletin_${state.employee.nomPrenom || 'Paie'}.pdf`);
  } catch (err) {
    console.error(err);
    alert('Erreur lors de la création du PDF.');
  } finally {
    state.isGeneratingPdf = false;
    render();
  }
}
